<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="허유정 Career Portfolio">
  <title>허유정 | Career</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style-dashboard.css?v=5">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
  <div class="content-wrapper">
    <div class="mobile-header">
      <div class="mobile-logo"><span class="mobile-logo-dot"></span> yoojung.dashboard</div>
      <div class="mobile-header-controls">
        <button type="button" class="control-btn" id="lang-toggle-mobile">EN</button>
        <button type="button" class="control-btn" id="theme-toggle-mobile">Light</button>
      </div>
    </div>

    <div class="topbar">
      <nav class="breadcrumb" aria-label="Section navigation">
        <a href="index.html" class="top-tab" id="nav-overview">Overview</a>
        <span class="breadcrumb-sep">|</span>
        <a href="career.html" class="top-tab current" id="nav-career">Career</a>
        <span class="breadcrumb-sep">|</span>
        <a href="projects.html" class="top-tab" id="nav-projects">Projects</a>
        <span class="breadcrumb-sep">|</span>
        <a href="blog.html" class="top-tab" id="nav-blog">Blog</a>
      </nav>
      <div class="topbar-controls">
        <div class="time-range"><span class="icon">&#9200;</span><span id="time-range-text">2018 - Present</span></div>
        <button type="button" class="control-btn" id="lang-toggle">EN</button>
        <button type="button" class="control-btn" id="theme-toggle">Light</button>
      </div>
    </div>

    <main class="main">
      <div class="grid-row fade-in" id="career">
        <div class="row-title" id="row-career-stack"><span class="chevron">&#9660;</span> Career</div>
        <div class="grid-2-1">
          <div class="panel table-panel">
            <div class="panel-header"><span class="panel-title" id="panel-career-timeline">Career Timeline</span></div>
            <div class="panel-body panel-body-tight">
              <table>
                <thead>
                  <tr>
                    <th class="col-career-period">Period</th>
                    <th class="col-career-status">Status</th>
                    <th class="col-career-role">Role</th>
                    <th>Details</th>
                  </tr>
                </thead>
                <tbody id="career-body"></tbody>
              </table>
            </div>
          </div>

          <div class="panel" id="career-detail-panel">
            <div class="panel-header"><span class="panel-title" id="career-detail-title">Career Detail</span></div>
            <div class="panel-body career-expand" id="career-expand">
              <ul class="career-expand-list" id="career-expand-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="./portfolio-data.js?v=11"></script>
  <script>
    (function() {
      var data = window.PORTFOLIO_DATA || {}
      var currentLang = localStorage.getItem('portfolio.lang') || (data.i18n && data.i18n.defaultLang) || 'ko'
      var currentTheme = localStorage.getItem('portfolio.theme') || 'dark'

      var fallbackUi = {
        ko: { navOverview: 'Overview', navCareer: 'Career', navProjects: 'Projects', navBlog: 'Posts', timeRange: '2018 - 현재', topLangButton: 'EN', topThemeDark: 'Dark', topThemeLight: 'Light', tablePeriod: 'Period', tableStatus: 'Status', tableRole: 'Role', tableDetails: 'Details', panelCareerTimeline: 'Career Timeline' },
        en: { navOverview: 'Overview', navCareer: 'Career', navProjects: 'Projects', navBlog: 'Posts', timeRange: '2018 - Present', topLangButton: 'KO', topThemeDark: 'Dark', topThemeLight: 'Light', tablePeriod: 'Period', tableStatus: 'Status', tableRole: 'Role', tableDetails: 'Details', panelCareerTimeline: 'Career Timeline' }
      }

      function t(value) {
        if (value && typeof value === 'object' && !Array.isArray(value)) return value[currentLang] || value.ko || value.en || ''
        return value || ''
      }

      function ui(key) {
        var table = (data.i18n && data.i18n.ui && data.i18n.ui[currentLang]) || fallbackUi[currentLang] || fallbackUi.ko
        return table[key] || key
      }

      function applyTheme(theme) {
        currentTheme = theme
        document.body.setAttribute('data-theme', theme)
        localStorage.setItem('portfolio.theme', theme)
        var label = theme === 'dark' ? ui('topThemeLight') : ui('topThemeDark')
        document.getElementById('theme-toggle').textContent = label
        document.getElementById('theme-toggle-mobile').textContent = label
      }

      function updateLangButtons() {
        var nextLangLabel = ui('topLangButton')
        document.getElementById('lang-toggle').textContent = nextLangLabel
        document.getElementById('lang-toggle-mobile').textContent = nextLangLabel
      }

      function renderCareer() {
        document.getElementById('nav-overview').textContent = ui('navOverview')
        document.getElementById('nav-career').textContent = ui('navCareer')
        document.getElementById('nav-projects').textContent = ui('navProjects')
        document.getElementById('nav-blog').textContent = ui('navBlog')
        document.getElementById('time-range-text').textContent = ui('timeRange')
        document.getElementById('panel-career-timeline').textContent = ui('panelCareerTimeline')

        var careerHeaders = document.querySelectorAll('#career .table-panel thead th')
        if (careerHeaders.length === 4) {
          careerHeaders[0].textContent = ui('tablePeriod')
          careerHeaders[1].textContent = ui('tableStatus')
          careerHeaders[2].textContent = ui('tableRole')
          careerHeaders[3].textContent = ui('tableDetails')
        }

        document.getElementById('career-body').innerHTML = (data.career || []).map(function(item, idx) {
          var status = t(item.status).toLowerCase()
          var statusClass = status === 'running' ? 'running' : 'completed'
          var companyNames = Array.isArray(item.companies) ? item.companies.map(function(c) { return t(c) }).filter(Boolean) : (item.company ? [t(item.company)] : [])
          var companyLine = companyNames.length ? companyNames.join(' / ') : ''
          return '<tr class="is-clickable" data-career-index="' + idx + '">' +
            '<td class="td-period">' + item.period + '</td>' +
            '<td><span class="td-status ' + statusClass + '"><span class="dot ' + (status === 'running' ? 'dot-green' : 'dot-blue') + '"></span> ' + status + '</span></td>' +
            '<td><div class="td-role">' + item.role + '</div><div class="td-team">' + (companyLine ? companyLine + ' · ' : '') + t(item.team) + '</div></td>' +
            '<td class="td-desc">' + item.details.map(t).join('<br>') + '</td>' +
          '</tr>'
        }).join('')

        var careerDetailTitle = document.getElementById('career-detail-title')
        var careerExpandList = document.getElementById('career-expand-list')

        function renderCareerExpand(index) {
          var item = data.career[index]
          if (!item) return
          careerDetailTitle.textContent = 'Career Detail - ' + item.period + ' / ' + item.role
          var lines = item.expanded ? t(item.expanded) : []
          if (!Array.isArray(lines) || !lines.length) lines = item.details.map(t)
          var companyNames = Array.isArray(item.companies) ? item.companies.map(function(c) { return t(c) }).filter(Boolean) : (item.company ? [t(item.company)] : [])
          if (companyNames.length) lines = ['Company: ' + companyNames.join(' / ')].concat(lines)
          careerExpandList.innerHTML = lines.map(function(line) { return '<li>' + line + '</li>' }).join('')

          document.querySelectorAll('#career-body tr').forEach(function(tr) { tr.classList.remove('is-active') })
          var activeRow = document.querySelector('#career-body tr[data-career-index="' + index + '"]')
          if (activeRow) activeRow.classList.add('is-active')
        }

        document.querySelectorAll('#career-body tr.is-clickable').forEach(function(row) {
          row.addEventListener('click', function() {
            renderCareerExpand(Number(this.getAttribute('data-career-index')))
          })
        })

        renderCareerExpand(0)
        updateLangButtons()
        applyTheme(currentTheme)
      }

      function onToggleLang() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko'
        localStorage.setItem('portfolio.lang', currentLang)
        renderCareer()
      }

      function onToggleTheme() {
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark')
      }

      document.getElementById('lang-toggle').addEventListener('click', onToggleLang)
      document.getElementById('lang-toggle-mobile').addEventListener('click', onToggleLang)
      document.getElementById('theme-toggle').addEventListener('click', onToggleTheme)
      document.getElementById('theme-toggle-mobile').addEventListener('click', onToggleTheme)

      document.addEventListener('DOMContentLoaded', function() {
        renderCareer()
        document.querySelectorAll('.fade-in').forEach(function(el) {
          el.classList.add('visible')
        })
      })
    })()
  </script>
</body>
</html>
